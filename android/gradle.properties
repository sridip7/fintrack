# --- MEMORY ALLOCATION (Tuned for Ryzen APU + 8GB RAM) ---
# We use 1.5GB instead of 2GB to leave room for your integrated graphics
org.gradle.jvmargs=-Xmx1536m -XX:+UseParallelGC -XX:MaxMetaspaceSize=1g

# --- PERFORMANCE BOOSTERS ---
# Keeps the build engine warm in the background
org.gradle.daemon=true

# Uses your Ryzen's 4 cores effectively
org.gradle.parallel=true

# Caches build tasks to avoid re-doing work
org.gradle.caching=true

# EXPERIMENTAL: Skips configuration phase. 
# If build fails, comment this line out first with a #
org.gradle.configuration-cache=false

# --- ANDROID DEFAULTS ---
android.useAndroidX=true
android.enableJetifier=true